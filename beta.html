<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Próximamente | VIMOD ARQUITECTURA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0d0d0d;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      padding: 20px;
    }
    .beta-container {
      text-align: center;
      background: #1a1a1a;
      padding: 3rem 2rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 400px;
      width: 100%;
    }
    .beta-title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }
    .beta-text {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 2rem;
    }
    .back-btn {
      display: inline-block;
      padding: 12px 24px;
      background: white;
      color: #000;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: transform 0.2s ease;
    }
    .back-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="beta-container">
    <div class="beta-title">Módulo en Desarrollo</div>
    <div class="beta-text">Estamos trabajando para ofrecerte la mejor experiencia muy pronto.</div>
    <a href="index.html" class="back-btn">Regresar</a>
  </div>
</body>
</html>
